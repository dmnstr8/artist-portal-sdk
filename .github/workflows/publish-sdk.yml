name: Publish SDK

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@dmnstr8'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @dmnstr8/artist-portal-sdk run build
      - run: pnpm -r --filter @dmnstr8/artist-portal-sdk publish --no-git-checks
